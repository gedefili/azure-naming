name: Deploy to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
  AZURE_FUNCTIONAPP_RESOURCE_GROUP: ${{ secrets.AZURE_FUNCTIONAPP_RESOURCE_GROUP }}
  PYTHON_VERSION: '3.11'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest
      - name: Run unit tests
        run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Ensure WEBSITE_RUN_FROM_PACKAGE is removed
        run: |
          az functionapp config appsettings delete \
            -n "$AZURE_FUNCTIONAPP_NAME" \
            -g "$AZURE_FUNCTIONAPP_RESOURCE_GROUP" \
            --setting-names WEBSITE_RUN_FROM_PACKAGE 2>/dev/null || true
      - name: Configure remote build settings
        run: |
          az functionapp config appsettings set \
            -n "$AZURE_FUNCTIONAPP_NAME" \
            -g "$AZURE_FUNCTIONAPP_RESOURCE_GROUP" \
            --settings \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true
      - name: Deploy Function App (remote build)
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: '.'
          scm-do-build-during-deployment: 'true'
          enable-oryx-build: 'true'

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Verify functions are registered
        run: |
          echo "Waiting 30s for deployment to stabilize..."
          sleep 30
          FUNC_COUNT=$(az functionapp function list \
            -n "$AZURE_FUNCTIONAPP_NAME" \
            -g "$AZURE_FUNCTIONAPP_RESOURCE_GROUP" \
            --query "length(@)" -o tsv)
          echo "Registered functions: ${FUNC_COUNT}"
          if [[ "${FUNC_COUNT}" -lt 1 ]]; then
            echo "::error::No functions registered after deployment!"
            az functionapp function list \
              -n "$AZURE_FUNCTIONAPP_NAME" \
              -g "$AZURE_FUNCTIONAPP_RESOURCE_GROUP" -o json
            exit 1
          fi
          echo "::notice::Deployment verified — ${FUNC_COUNT} functions registered"
      - name: Smoke test health endpoint
        run: |
          APP_URL="https://${AZURE_FUNCTIONAPP_NAME}.azurewebsites.net"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "${APP_URL}/api/docs" --max-time 15)
          echo "GET /api/docs → HTTP ${HTTP_CODE}"
          if [[ "${HTTP_CODE}" == "404" ]]; then
            echo "::error::Smoke test failed — /api/docs returned 404"
            exit 1
          fi
          echo "::notice::Smoke test passed"
